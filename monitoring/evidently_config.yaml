# Evidently AI drift monitoring configuration

service:
  host: "0.0.0.0"
  port: 8000

monitoring:
  # How often to check for drift (in seconds)
  check_interval: 300

  # Minimum samples before running drift detection
  min_samples: 50

  # Reference window size (number of predictions)
  reference_window: 500

  # Current window size
  current_window: 100

drift_detection:
  # Statistical test for numerical features
  numerical_method: "ks"  # Kolmogorov-Smirnov test
  numerical_threshold: 0.05

  # Statistical test for categorical features
  categorical_method: "chi2"  # Chi-squared test
  categorical_threshold: 0.05

features:
  numerical:
    - text_length
    - latency_ms
  categorical:
    - predicted_label
    - model_version

alerts:
  # Log drift alerts
  log_file: "logs/drift_alerts.jsonl"
